<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WHOOP OAuth Callback</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; line-height: 1.6; color: #111; }
    code, pre { background: #f4f4f4; border-radius: 6px; }
    code { padding: 2px 6px; }
    pre { padding: 12px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>WHOOP OAuth Callback Received</h1>
  <p>If WHOOP redirected you here, the authorization response is in the URL.</p>
  <p>Copy the full URL from your browser address bar and provide it to the local setup flow if needed.</p>

  <h2>Current URL</h2>
  <pre id="url"></pre>

  <script>
    document.getElementById('url').textContent = window.location.href;
  </script>
</body>
</html>
